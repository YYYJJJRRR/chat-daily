<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 对话日报工具</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link href="/assets/app.css" rel="stylesheet">
</head>
<body>

<header class="header">
    <span class="logo">📋 对话日报</span>
    <span class="badge">v0.1</span>
</header>

<div class="app-body">

<aside class="sidebar">
    <div class="panel">
        <div class="panel-header">📝 粘贴原始对话</div>
        <div class="panel-body">
            <textarea id="sourceText" placeholder="将 AI 对话内容粘贴到这里..."></textarea>
            <div class="toolbar">
                <button class="btn btn-primary" id="parseBtn">解析</button>
                <button class="btn btn-secondary btn-sm" id="saveEntryBtn" style="display:none">保存条目</button>
                <span id="parseStatus" class="status-text"></span>
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">
            💾 opencode 记录
            <span class="badge-sm" id="sessionCount"></span>
        </div>
        <div class="panel-body">
            <div class="toolbar" style="margin-bottom:10px">
                <button class="btn btn-secondary btn-sm" id="loadSessionsBtn">加载今日记录</button>
                <span id="sessionStatus" class="status-text"></span>
            </div>
            <div id="sessionList" class="session-list"></div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">
            📅 日报列表
            <span class="badge-sm" id="dailyCount"></span>
        </div>
        <div class="panel-body">
            <div class="toolbar" style="margin-bottom:10px">
                <button class="btn btn-secondary btn-sm" id="loadDailiesBtn">刷新</button>
                <button class="btn btn-secondary btn-sm" id="generateDailyBtn">今日日报</button>
                <button class="btn btn-secondary btn-sm" id="generateWeeklyBtn">本周周报</button>
                <button class="btn btn-secondary btn-sm" id="generateMonthlyBtn">本月月报</button>
            </div>
            <div id="dailyList" class="session-list"></div>
        </div>
    </div>
</aside>

<main class="main">
    <div id="resultArea">
        <div class="empty-state">
            <div class="empty-icon">💬</div>
            <div class="empty-title">粘贴对话开始整理</div>
            <div class="empty-desc">在左侧粘贴你与 AI 的对话内容，点击「解析」自动分段、提取代码和待办事项</div>
        </div>
    </div>

    <div id="parseResult" style="display:none">
        <div class="stats-bar" id="statsBar"></div>

        <div class="panel">
            <div class="panel-header">💬 对话轮次 <span class="badge-sm" id="roundsCount"></span></div>
            <div class="panel-body" id="roundsBody"></div>
        </div>

        <div class="panel">
            <div class="panel-header">🧩 代码块 <span class="badge-sm" id="codeCount"></span></div>
            <div class="panel-body" id="codeBody"></div>
        </div>

        <div class="panel">
            <div class="panel-header">✅ 待办事项 <span class="badge-sm" id="todoCount"></span></div>
            <div class="panel-body" id="todoBody"></div>
        </div>

        <div class="panel">
            <div class="panel-header">⭐ 关键句 <span class="badge-sm" id="hlCount"></span></div>
            <div class="panel-body" id="hlBody"></div>
        </div>
    </div>

    <div id="dailyPanel" style="display:none">
        <div class="panel">
            <div class="panel-header">📄 日报预览</div>
            <div class="panel-body" id="dailyContent" style="font-size:13px;line-height:1.7;white-space:pre-wrap;font-family:var(--font-mono);background:#f8fafc;border-radius:6px;padding:16px"></div>
        </div>
    </div>
</main>

</div>

<script src="/assets/app.js"></script>
</body>
</html>
